<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AgilBank - Preview Ajustes V2</title>
  <link rel="stylesheet" href="css/home-v2-preview.css" />
  <link rel="stylesheet" href="css/ajustes-v2-preview.css" />
</head>
<body class="settings-v2-body">
  <div class="home-v2-app settings-v2-app" id="settingsV2AppShell">
    <div class="settings-v2-page" id="settingsV2PreviewRoot">
      <section class="settings-v2-top" aria-label="Perfil e ajustes">
        <header class="home-v2-preview__header settings-v2-header">
          <img class="home-v2-preview__logo settings-v2-logo" src="../brand/logo-agil-bank-clara.png" alt="AgilBank" width="160" height="32" />
          <div class="home-v2-preview__header-actions">
            <button type="button" class="home-v2-preview__icon-btn settings-v2-icon-btn settings-v2-icon-btn--notif" aria-label="Notificações" data-preview-action="notificacoes">
              <span class="settings-v2-badge" aria-hidden="true">3</span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.71V4a2 2 0 1 0-4 0v.29A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z"/></svg>
            </button>
            <button type="button" class="home-v2-preview__icon-btn settings-v2-icon-btn" aria-label="Buscar" data-preview-action="busca">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"/></svg>
            </button>
            <button type="button" class="home-v2-preview__icon-btn settings-v2-icon-btn settings-v2-icon-btn--eye" aria-label="Exibir valores" data-preview-action="mostrar-valores">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
        </header>

        <div class="settings-v2-title-block">
          <h1 class="settings-v2-title">Perfil e Ajustes</h1>
          <p class="settings-v2-subtitle">Gerencie sua conta, segurança e preferências.</p>
        </div>

        <article class="settings-v2-profile-card" aria-label="Perfil do usuário">
          <div class="settings-v2-avatar">
            <svg viewBox="0 0 96 96" aria-hidden="true"><path d="M48 49c11.05 0 20-8.95 20-20S59.05 9 48 9 28 17.95 28 29s8.95 20 20 20Zm0 8c-15.3 0-32 7.6-32 18v8h64v-8c0-10.4-16.7-18-32-18Z"/></svg>
            <button type="button" class="settings-v2-avatar-edit" aria-label="Editar foto" data-preview-action="editar-foto">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25Zm17.7-10.2a1 1 0 0 0 0-1.4l-2.35-2.35a1 1 0 0 0-1.4 0l-1.85 1.85 3.75 3.75 1.85-1.85Z"/></svg>
            </button>
          </div>
          <div class="settings-v2-profile-copy">
            <h2>Camila Maria de Oliveira Nascimento</h2>
            <p>ailtonmarques023@gmail.com</p>
            <p>Ag 0001 <span aria-hidden="true">•</span> Conta 84899-18</p>
            <span class="settings-v2-verified"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 16.2-4.2-4.2 1.4-1.4L9 13.4l8.8-8.8L19.2 6 9 16.2Z"/></svg>Conta verificada</span>
          </div>
        </article>
      </section>

      <main class="settings-v2-main">
        <section class="settings-v2-card" aria-labelledby="settings-account-title">
          <h2 class="settings-v2-section-title" id="settings-account-title">Minha conta</h2>
          <div class="settings-v2-list">
            <button type="button" class="settings-v2-row" data-preview-action="dados-pessoais">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z"/></svg></span>
              <span>Dados pessoais</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="endereco">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/></svg></span>
              <span>Endereço</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="documentos">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6Zm-1 7V3.5L18.5 9H13Zm3 5H8v-2h8v2Zm0 4H8v-2h8v2Z"/></svg></span>
              <span>Documentos</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="chaves-pix">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M13.5 6.5 11 4 4 11l7 7 2.5-2.5L9 11l4.5-4.5Zm-3 11 2.5 2.5L20 13l-7-7-2.5 2.5L15 13l-4.5 4.5Z"/></svg></span>
              <span>Chaves Pix</span>
              <span class="settings-v2-chevron">›</span>
            </button>
          </div>
        </section>

        <section class="settings-v2-card" aria-labelledby="settings-security-title">
          <h2 class="settings-v2-section-title" id="settings-security-title">Segurança</h2>
          <div class="settings-v2-list">
            <button type="button" class="settings-v2-row" data-preview-action="biometria-facial">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M4 4h5v2H6v3H4V4Zm11 0h5v5h-2V6h-3V4ZM4 15h2v3h3v2H4v-5Zm14 0h2v5h-5v-2h3v-3ZM8 10h2v2H8v-2Zm6 0h2v2h-2v-2Zm-6 5h8v2H8v-2Z"/></svg></span>
              <span>Biometria facial</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="alterar-senha">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v10h14V10a2 2 0 0 0-2-2Zm-7 0V6a2 2 0 0 1 4 0v2h-4Zm3 8.7V18h-2v-1.3a2 2 0 1 1 2 0Z"/></svg></span>
              <span>Alterar senha</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="privacidade">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="m12 2 8 4v6c0 5.4-3.5 9.9-8 11-4.5-1.1-8-5.6-8-11V6l8-4Zm0 3.2L6 8v4c0 4 2.5 7.4 6 8.5 3.5-1.1 6-4.5 6-8.5V8l-6-2.8Z"/></svg></span>
              <span>Privacidade</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <div class="settings-v2-row settings-v2-row--switch">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5Zm0 11A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg></span>
              <span>Mostrar saldo</span>
              <button type="button" class="settings-v2-switch settings-v2-switch--on" aria-pressed="true" data-preview-switch="saldo"><span></span></button>
            </div>
            <div class="settings-v2-row settings-v2-row--switch">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.71V4a2 2 0 1 0-4 0v.29A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z"/></svg></span>
              <span>Notificações</span>
              <button type="button" class="settings-v2-switch settings-v2-switch--on" aria-pressed="true" data-preview-switch="notificacoes"><span></span></button>
            </div>
          </div>
        </section>

        <section class="settings-v2-card" aria-labelledby="settings-preferences-title">
          <h2 class="settings-v2-section-title" id="settings-preferences-title">Preferências</h2>
          <div class="settings-v2-list">
            <div class="settings-v2-row settings-v2-row--switch">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M21 14.6A8 8 0 0 1 9.4 3a9 9 0 1 0 11.6 11.6Z"/></svg></span>
              <span>Modo escuro</span>
              <button type="button" class="settings-v2-switch" aria-pressed="false" data-preview-switch="modo-escuro"><span></span></button>
            </div>
            <button type="button" class="settings-v2-row" data-preview-action="idioma">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm6.93 9h-3.02a15.6 15.6 0 0 0-1.02-5A8.02 8.02 0 0 1 18.93 11ZM12 4.04c.83 1.2 1.48 3.02 1.74 4.96h-3.48C10.52 7.06 11.17 5.24 12 4.04ZM4.26 13h3.02c.12 1.78.48 3.5 1.02 5A8.02 8.02 0 0 1 4.26 13Zm3.02-2H4.26A8.02 8.02 0 0 1 8.3 6a15.6 15.6 0 0 0-1.02 5ZM12 19.96c-.83-1.2-1.48-3.02-1.74-4.96h3.48c-.26 1.94-.91 3.76-1.74 4.96ZM14.17 13H9.83a15.4 15.4 0 0 1 0-2h4.34a15.4 15.4 0 0 1 0 2Zm1.53 5c.54-1.5.9-3.22 1.02-5h3.02A8.02 8.02 0 0 1 15.7 18Z"/></svg></span>
              <span>Idioma</span>
              <span class="settings-v2-row-value">Português (Brasil)</span>
              <span class="settings-v2-chevron">›</span>
            </button>
            <button type="button" class="settings-v2-row" data-preview-action="ajuda-suporte">
              <span class="settings-v2-row-icon"><svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2Zm1-16a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm0-14a3 3 0 0 0-3 3h2a1 1 0 1 1 1 1c-1.1 0-2 .9-2 2v1h2v-1c1.66 0 3-1.34 3-3s-1.34-3-3-3Z"/></svg></span>
              <span>Ajuda e suporte</span>
              <span class="settings-v2-chevron">›</span>
            </button>
          </div>
        </section>

        <button type="button" class="settings-v2-logout" data-preview-action="sair-conta">
          <span class="settings-v2-logout-icon"><svg viewBox="0 0 24 24"><path d="M10 17v-3H3v-4h7V7l5 5-5 5Zm2-13h8v16h-8v-2h6V6h-6V4Z"/></svg></span>
          <span>Sair da conta</span>
          <span class="settings-v2-chevron">›</span>
        </button>
      </main>

      <nav class="home-v2-preview__bottom-nav" aria-label="Navegação principal">
        <button type="button" class="home-v2-preview__nav-item" data-preview-action="nav-inicio">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5Z"/></svg>
          Início
        </button>
        <button type="button" class="home-v2-preview__nav-item" data-preview-action="nav-pix">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 6.5 11 4 4 11l7 7 2.5-2.5L9 11l4.5-4.5Zm-3 11 2.5 2.5L20 13l-7-7-2.5 2.5L15 13l-4.5 4.5Z"/></svg>
          Pix
        </button>
        <button type="button" class="home-v2-preview__nav-item home-v2-preview__nav-item--notif" data-preview-action="nav-notificacoes">
          <span class="settings-v2-nav-dot" aria-hidden="true"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.71V4a2 2 0 1 0-4 0v.29A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z"/></svg>
          Notificações
        </button>
        <button type="button" class="home-v2-preview__nav-item" data-preview-action="nav-servicos">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h4V4H4v4Zm6 12h4v-4h-4v4Zm-6 0h4v-4H4v4Zm0-6h4v-4H4v4Zm6 0h4v-4h-4v4Zm6-10v4h4V4h-4Zm0 6h4v-4h-4v4Zm0 6h4v-4h-4v4Zm0 6h4v-4h-4v4Z"/></svg>
          Serviços
        </button>
        <button type="button" class="home-v2-preview__nav-item home-v2-preview__nav-item--active" data-preview-action="nav-ajustes" aria-current="page">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.09-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58ZM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2Z"/></svg>
          Ajustes
        </button>
      </nav>
    </div>
  </div>

  <script src="js/ajustes-v2-preview.js" defer></script>
</body>
</html>
