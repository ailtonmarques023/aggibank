<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando — AgilBank</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <script>
    (function () {
      var q = typeof window.location !== 'undefined' && window.location.search ? window.location.search : '';
      window.location.replace('/register' + q);
    })();
  </script>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f7fbff; color: #172033;">
  <div style="text-align: center; max-width: 360px; padding: 24px;">
    <img src="/brand/logo-agil-bank-escura.png" alt="AgilBank" width="200" height="40" decoding="async" style="height: 40px; width: auto; max-width: 220px; object-fit: contain; margin-bottom: 16px;" />
    <p style="margin: 0 0 12px;">Estamos levando você para a abertura de conta oficial (cadastro mobile-first).</p>
    <p style="margin: 0;">
      <a id="agilbank-register-fallback" href="/register">Continuar para cadastro</a>
    </p>
  </div>
  <script>
    (function () {
      var q = window.location.search || '';
      var a = document.getElementById('agilbank-register-fallback');
      if (a) a.setAttribute('href', '/register' + q);
    })();
  </script>
  <noscript>
    <p>Ative o JavaScript ou <a href="/register">abra o cadastro oficial aqui</a>.</p>
  </noscript>
</body>
</html>
