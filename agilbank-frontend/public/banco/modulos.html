<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <title>Serviços — AgilBank</title>
  <link rel="stylesheet" href="css/agilbank-brand.css">
  <script src="js/legacyAuthStore.js"></script>
  <script src="js/agilbankApiBase.js"></script>
  <script>
    (function enforceAuthModulos() {
      var authStore = window.AgilBank && window.AgilBank.auth;
      var sessionToken = authStore && typeof authStore.getToken === 'function'
        ? authStore.getToken()
        : sessionStorage.getItem('agilbank_token') || sessionStorage.getItem('govbr_token') || sessionStorage.getItem('token') ||
          localStorage.getItem('agilbank_token') || localStorage.getItem('govbr_token') || localStorage.getItem('token');
      if (!sessionToken) {
        window.location.replace('/login');
      }
    })();
  </script>
  <style>
    :root {
      --ab-blue: #1351B4;
      --ab-blue-ink: #0c2d6b;
      --ab-bg: #f5f7fb;
      --ab-surface: #ffffff;
      --ab-circle-bg: #eef1f7;
      --ab-text: #0f172a;
      --ab-muted: #64748b;
      --ab-soon: #94a3b8;
      --ab-radius-xl: 22px;
      --ab-radius-pill: 999px;
      --ab-shadow-soft: 0 2px 14px rgba(15, 23, 42, 0.06);
      --ab-shadow-card: 0 8px 32px rgba(15, 23, 42, 0.08);
      --ab-circle-size: 62px;
      --ab-icon: 30px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, Ubuntu, sans-serif;
      background: var(--ab-bg);
      color: var(--ab-text);
    }
    .ab-app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 14px calc(24px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    /* Header estilo app */
    .ab-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 4px 2px 2px;
    }
    .ab-back-circle {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: var(--ab-radius-pill);
      border: none;
      background: var(--ab-surface);
      box-shadow: var(--ab-shadow-soft);
      color: var(--ab-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .ab-back-circle:active {
      transform: scale(0.96);
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.08);
    }
    .ab-back-circle:focus-visible {
      outline: 2px solid var(--ab-blue);
      outline-offset: 2px;
    }
    .ab-back-circle svg {
      display: block;
      margin-left: -2px;
    }
    .ab-top-main {
      flex: 1;
      min-width: 0;
      padding-top: 2px;
    }
    .ab-brand-line {
      display: block;
      margin-bottom: 6px;
    }
    .ab-brand-line img {
      height: 28px;
      width: auto;
      max-width: min(170px, 54vw);
    }
    .ab-top-main h1 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--ab-text);
    }
    .ab-sub {
      margin: 6px 0 0;
      font-size: 0.84rem;
      line-height: 1.4;
      color: var(--ab-muted);
      font-weight: 500;
    }
    .ab-avatar {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: var(--ab-radius-pill);
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(19, 81, 180, 0.2);
      border: 1px solid rgba(0, 102, 179, 0.14);
      overflow: hidden;
    }
    .ab-avatar-icon {
      width: 26px;
      height: auto;
      display: block;
      object-fit: contain;
    }
    /* Card principal atalhos */
    .ab-card {
      background: var(--ab-surface);
      border-radius: var(--ab-radius-xl);
      box-shadow: var(--ab-shadow-card);
      padding: 18px 12px 20px;
      border: 1px solid rgba(255, 255, 255, 0.9);
    }
    .ab-card-title {
      margin: 0 0 14px;
      padding: 0 6px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ab-muted);
      letter-spacing: 0.02em;
    }
    .ab-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px 6px;
      padding: 0 2px;
    }
    @media (min-width: 400px) {
      .ab-grid { gap: 18px 10px; }
    }
    .ab-tile {
      border: none;
      background: transparent;
      padding: 4px 0 0;
      margin: 0;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .ab-tile:focus-visible {
      outline: 2px solid var(--ab-blue);
      outline-offset: 4px;
      border-radius: 16px;
    }
    .ab-circle {
      width: var(--ab-circle-size);
      height: var(--ab-circle-size);
      border-radius: 50%;
      background: var(--ab-circle-bg);
      border: 1px solid rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ab-blue-ink);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }
    .ab-tile:active .ab-circle {
      transform: scale(0.94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5), 0 2px 8px rgba(19, 81, 180, 0.12);
    }
    .ab-circle svg {
      width: var(--ab-icon);
      height: var(--ab-icon);
      flex-shrink: 0;
    }
    .ab-tile--soon .ab-circle {
      color: var(--ab-soon);
      background: #f1f4f9;
      border-color: rgba(148, 163, 184, 0.25);
    }
    .ab-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ab-text);
      line-height: 1.2;
      max-width: 100%;
      padding: 0 1px;
      hyphens: auto;
      word-break: break-word;
    }
    @media (min-width: 360px) {
      .ab-label { font-size: 0.76rem; }
    }
    .ab-tile--soon .ab-label {
      color: var(--ab-muted);
      font-weight: 650;
    }
    /* Banner informativo */
    .ab-banner {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: var(--ab-radius-xl);
      padding: 18px 18px 20px;
      box-shadow: var(--ab-shadow-soft);
      border: 1px solid rgba(226, 232, 240, 0.9);
    }
    .ab-banner h2 {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ab-text);
    }
    .ab-banner p {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.45;
      color: var(--ab-muted);
      font-weight: 500;
    }
    /* Toast */
    #abToast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%) translateY(140%);
      max-width: min(92vw, 360px);
      padding: 15px 20px;
      background: #0f172a;
      color: #f8fafc;
      border-radius: 14px;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      z-index: 99999;
      opacity: 0;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
      pointer-events: none;
    }
    #abToast.ab-toast--show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    /* Modal em breve */
    #abModalSoon {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.48);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99998;
      padding: 20px;
    }
    #abModalSoon.ab-modal--open { display: flex; }
    .ab-modal-card {
      background: var(--ab-surface);
      border-radius: 20px;
      padding: 26px 22px 20px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.22);
      border: 1px solid rgba(226, 232, 240, 0.95);
      animation: abModalIn 0.22s ease-out;
    }
    @keyframes abModalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .ab-modal-card h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ab-text);
    }
    .ab-modal-card p {
      margin: 0 0 22px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--ab-muted);
      font-weight: 500;
    }
    .ab-modal-actions button {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      background: linear-gradient(180deg, var(--ab-blue) 0%, #0e4599 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(19, 81, 180, 0.35);
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    .ab-modal-actions button:active {
      transform: scale(0.98);
      filter: brightness(0.95);
    }
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0066b3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AgilBank">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

</head>
<body>
  <div class="ab-app">
    <header class="ab-top">
      <button type="button" class="ab-back-circle" onclick="location.href='index.html'" aria-label="Voltar ao início">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ab-top-main">
        <span class="ab-brand-line"><img src="assets/brand/agilbank-logo-light-bg.svg" alt="AgilBank" class="agilbank-brand-logo agilbank-brand-logo--light agilbank-brand-logo--inline" width="170" height="28" decoding="async" /></span>
        <h1>Serviços</h1>
        <p class="ab-sub">O que você precisa em poucos toques. Nada é concluído nesta tela sem você ir à área correspondente.</p>
      </div>
      <div class="ab-avatar" aria-hidden="true">
        <img src="assets/brand/agilbank-icon.svg" alt="" width="145" height="140" decoding="async" class="ab-avatar-icon" />
      </div>
    </header>

    <section class="ab-card" aria-labelledby="abShortcutsHeading">
      <h2 class="ab-card-title" id="abShortcutsHeading">Acesso rápido</h2>
      <div class="ab-grid" id="abGrid"></div>
    </section>

    <section class="ab-banner" aria-label="Dica de uso">
      <h2>Movimente sua conta</h2>
      <p>Acesse seus principais serviços em poucos toques.</p>
    </section>
  </div>

  <div id="abToast" role="status" aria-live="polite"></div>
  <div id="abModalSoon" role="dialog" aria-modal="true" aria-labelledby="abModalSoonTitle">
    <div class="ab-modal-card">
      <h2 id="abModalSoonTitle">Em breve</h2>
      <p id="abModalSoonBody">Estamos preparando esta função com segurança e integração ao backend.</p>
      <div class="ab-modal-actions">
        <button type="button" onclick="document.getElementById('abModalSoon').classList.remove('ab-modal--open')">Entendi</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var S = {
        stroke: ' stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" fill="none"',
        w: 30,
        h: 30
      };

      function showToast(msg) {
        var el = document.getElementById('abToast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('ab-toast--show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () {
          el.classList.remove('ab-toast--show');
        }, 3200);
      }

      function showSoonModal(title, body) {
        var root = document.getElementById('abModalSoon');
        var t = document.getElementById('abModalSoonTitle');
        var b = document.getElementById('abModalSoonBody');
        if (t) t.textContent = title || 'Em breve';
        if (b) b.textContent = body || 'Funcionalidade em breve.';
        if (root) root.classList.add('ab-modal--open');
      }

      function goIndexWithTarget(target) {
        try {
          sessionStorage.setItem('agilbank_modulos_target', target);
        } catch (e) {
          showToast('Não foi possível preparar a navegação. Tente de novo.');
          return;
        }
        window.location.href = 'index.html';
      }

      /* Ordem bancária: Pix → Adicionar → Transferir → Pagar → Cartões → Empréstimo → Extrato → Recargas → Taxas → Open Finance */
      var items = [
        {
          id: 'pix',
          label: 'Pix',
          desc: 'Enviar, receber e copiar.',
          mode: 'index',
          target: 'pix',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'
        },
        {
          id: 'add',
          label: 'Adicionar',
          desc: 'Colocar saldo na conta.',
          mode: 'href',
          href: 'deposito.html',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>'
        },
        {
          id: 'transfer',
          label: 'Transferir',
          desc: 'Para outra conta AgilBank.',
          mode: 'href',
          href: 'transferir.html',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><path d="M8 7h12M8 7l3-3M8 7l3 3"/><path d="M16 17H4M16 17l-3-3M16 17l-3 3"/></svg>'
        },
        {
          id: 'pay',
          label: 'Pagar',
          desc: 'Boletos e cobranças.',
          mode: 'index',
          target: 'pagar',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><path d="M4 7h16v10H4z"/><path d="M8 11h8M8 15h5"/></svg>'
        },
        {
          id: 'cards',
          label: 'Cartões',
          desc: 'Físico e virtual.',
          mode: 'index',
          target: 'cartoes',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>'
        },
        {
          id: 'loan',
          label: 'Empréstimo',
          desc: 'Propostas e crédito.',
          mode: 'href',
          href: 'emprestimos.html',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 010 7H6"/></svg>'
        },
        {
          id: 'stmt',
          label: 'Extrato',
          desc: 'Movimentações.',
          mode: 'index',
          target: 'extrato',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h6"/></svg>'
        },
        {
          id: 'topup',
          label: 'Recargas',
          desc: 'Celular e serviços.',
          mode: 'soon',
          soonTitle: 'Recargas',
          soonBody: 'Recarga de celular e serviços estará disponível em breve.',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg>'
        },
        {
          id: 'fees',
          label: 'Taxas',
          desc: 'Tarifas e limites.',
          mode: 'soon',
          soonTitle: 'Taxas e limites',
          soonBody: 'Consulta detalhada de tarifas e pacotes será disponibilizada em breve.',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><path d="M4 7l8-4 8 4v10l-8 4-8-4z"/><path d="M12 3v18"/></svg>'
        },
        {
          id: 'openfin',
          label: 'Open Finance',
          desc: 'Conectar contas.',
          mode: 'soon',
          soonTitle: 'Open Finance',
          soonBody: 'Compartilhamento de dados com outras instituições será habilitado em fase futura.',
          svg: '<svg width="' + S.w + '" height="' + S.h + '" viewBox="0 0 24 24"' + S.stroke + '><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>'
        }
      ];

      var grid = document.getElementById('abGrid');
      items.forEach(function (it) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ab-tile' + (it.mode === 'soon' ? ' ab-tile--soon' : '');
        btn.setAttribute('aria-label', it.label + '. ' + it.desc);

        var circle = document.createElement('span');
        circle.className = 'ab-circle';
        circle.innerHTML = it.svg;
        btn.appendChild(circle);

        var lab = document.createElement('span');
        lab.className = 'ab-label';
        lab.textContent = it.label;
        btn.appendChild(lab);

        btn.addEventListener('click', function () {
          if (it.mode === 'index') {
            goIndexWithTarget(it.target);
          } else if (it.mode === 'href') {
            window.location.href = it.href;
          } else if (it.mode === 'soon') {
            showSoonModal(it.soonTitle, it.soonBody);
          }
        });

        grid.appendChild(btn);
      });

      document.getElementById('abModalSoon').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('ab-modal--open');
      });
    })();
  </script>
  <script src="js/pwa-register.js"></script>

</body>
</html>
