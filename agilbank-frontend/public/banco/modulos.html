<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços — AgilBank</title>
  <script src="js/legacyAuthStore.js"></script>
  <script src="js/agilbankApiBase.js"></script>
  <script>
    (function enforceAuthModulos() {
      var authStore = window.AgilBank && window.AgilBank.auth;
      var sessionToken = authStore && typeof authStore.getToken === 'function'
        ? authStore.getToken()
        : sessionStorage.getItem('agilbank_token') || sessionStorage.getItem('govbr_token') || sessionStorage.getItem('token') ||
          localStorage.getItem('agilbank_token') || localStorage.getItem('govbr_token') || localStorage.getItem('token');
      if (!sessionToken) {
        window.location.replace('/login');
      }
    })();
  </script>
  <style>
    :root {
      --ab-blue: #1351B4;
      --ab-blue-dark: #0d3d88;
      --ab-green: #00A86B;
      --ab-bg: #f4f7fb;
      --ab-card: #ffffff;
      --ab-text: #1a2744;
      --ab-muted: #5c6b82;
      --ab-shadow: 0 4px 20px rgba(19, 81, 180, 0.08);
      --ab-radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif;
      background: linear-gradient(180deg, #eef3fb 0%, var(--ab-bg) 32%);
      color: var(--ab-text);
    }
    .ab-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }
    .ab-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 16px;
    }
    .ab-back {
      min-width: 44px;
      min-height: 44px;
      border: none;
      border-radius: 12px;
      background: var(--ab-card);
      box-shadow: var(--ab-shadow);
      color: var(--ab-blue);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ab-back:active { transform: scale(0.97); }
    .ab-title-block { flex: 1; }
    .ab-title-block h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .ab-title-block p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: var(--ab-muted);
      line-height: 1.35;
    }
    .ab-brand {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ab-blue);
      letter-spacing: 0.06em;
    }
    .ab-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px 12px;
      padding: 8px 4px 0;
    }
    @media (min-width: 480px) {
      .ab-grid { grid-template-columns: repeat(4, 1fr); gap: 22px 16px; }
    }
    .ab-tile {
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ab-tile:focus-visible {
      outline: 2px solid var(--ab-blue);
      outline-offset: 4px;
      border-radius: 20px;
    }
    .ab-circle {
      width: 64px;
      height: 64px;
      margin: 0 auto 8px;
      border-radius: 50%;
      background: var(--ab-card);
      box-shadow: var(--ab-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ab-blue);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .ab-tile:active .ab-circle {
      transform: scale(0.94);
      box-shadow: 0 2px 10px rgba(19, 81, 180, 0.12);
    }
    .ab-tile--soon .ab-circle {
      color: var(--ab-muted);
      background: #f0f2f6;
    }
    .ab-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ab-text);
      line-height: 1.2;
    }
    .ab-desc {
      display: none;
    }
    @media (min-width: 480px) {
      .ab-desc {
        display: block;
        font-size: 0.68rem;
        color: var(--ab-muted);
        margin-top: 4px;
        line-height: 1.25;
        max-width: 120px;
        margin-left: auto;
        margin-right: auto;
      }
    }
    #abToast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(120%);
      max-width: min(92vw, 360px);
      padding: 14px 18px;
      background: #1a2744;
      color: #fff;
      border-radius: 12px;
      font-size: 0.88rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 99999;
      opacity: 0;
      transition: transform 0.28s ease, opacity 0.28s ease;
      pointer-events: none;
    }
    #abToast.ab-toast--show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #abModalSoon {
      position: fixed;
      inset: 0;
      background: rgba(26, 39, 68, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99998;
      padding: 20px;
    }
    #abModalSoon.ab-modal--open { display: flex; }
    .ab-modal-card {
      background: #fff;
      border-radius: var(--ab-radius);
      padding: 22px 20px 18px;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
    }
    .ab-modal-card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: var(--ab-text);
    }
    .ab-modal-card p {
      margin: 0 0 16px;
      font-size: 0.88rem;
      color: var(--ab-muted);
      line-height: 1.45;
    }
    .ab-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .ab-modal-actions button {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--ab-blue);
      color: #fff;
    }
    .ab-modal-actions button:active { background: var(--ab-blue-dark); }
  </style>
</head>
<body>
  <div class="ab-shell">
    <header class="ab-header">
      <button type="button" class="ab-back" onclick="location.href='index.html'" aria-label="Voltar ao início">←</button>
      <div class="ab-title-block">
        <div class="ab-brand">AGILBANK</div>
        <h1>Todos os serviços</h1>
        <p>Atalhos rápidos. Nenhuma operação é concluída nesta tela — apenas navegação ou aviso.</p>
      </div>
    </header>

    <main class="ab-grid" id="abGrid" aria-label="Atalhos bancários"></main>
  </div>

  <div id="abToast" role="status" aria-live="polite"></div>
  <div id="abModalSoon" role="dialog" aria-modal="true" aria-labelledby="abModalSoonTitle">
    <div class="ab-modal-card">
      <h2 id="abModalSoonTitle">Em breve</h2>
      <p id="abModalSoonBody">Estamos preparando esta função com segurança e integração real ao backend.</p>
      <div class="ab-modal-actions">
        <button type="button" onclick="document.getElementById('abModalSoon').classList.remove('ab-modal--open')">OK</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      function showToast(msg) {
        var el = document.getElementById('abToast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('ab-toast--show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () {
          el.classList.remove('ab-toast--show');
        }, 3200);
      }

      function showSoonModal(title, body) {
        var root = document.getElementById('abModalSoon');
        var t = document.getElementById('abModalSoonTitle');
        var b = document.getElementById('abModalSoonBody');
        if (t) t.textContent = title || 'Em breve';
        if (b) b.textContent = body || 'Funcionalidade em breve.';
        if (root) root.classList.add('ab-modal--open');
      }

      function goIndexWithTarget(target) {
        try {
          sessionStorage.setItem('agilbank_modulos_target', target);
        } catch (e) {
          showToast('Não foi possível preparar a navegação. Tente de novo.');
          return;
        }
        window.location.href = 'index.html';
      }

      var items = [
        {
          id: 'pix',
          label: 'Pix',
          desc: 'Enviar, receber e copiar Pix.',
          mode: 'index',
          target: 'pix',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'
        },
        {
          id: 'add',
          label: 'Adicionar',
          desc: 'Gerar Pix para colocar saldo.',
          mode: 'soon',
          soonTitle: 'Adicionar dinheiro',
          soonBody: 'Depósito via Pix para saldo será habilitado em uma fase futura, com endpoint dedicado no backend. Por enquanto, use os canais já disponíveis no app.',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>'
        },
        {
          id: 'transfer',
          label: 'Transferir',
          desc: 'TED, DOC e envio de valores.',
          mode: 'soon',
          soonTitle: 'Transferir',
          soonBody: 'Transferências entre contas serão integradas em breve.',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h14l-4 4"/><path d="M17 17H3l4-4"/></svg>'
        },
        {
          id: 'pay',
          label: 'Pagar',
          desc: 'Boletos e cobranças.',
          mode: 'index',
          target: 'pagar',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15h4M7 11h10"/></svg>'
        },
        {
          id: 'cards',
          label: 'Cartões',
          desc: 'Cartão físico e virtual.',
          mode: 'index',
          target: 'cartoes',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>'
        },
        {
          id: 'loan',
          label: 'Empréstimo',
          desc: 'Propostas e liberação.',
          mode: 'href',
          href: 'emprestimos.html',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 010 7H6"/></svg>'
        },
        {
          id: 'topup',
          label: 'Recargas',
          desc: 'Celular e serviços.',
          mode: 'soon',
          soonTitle: 'Recargas',
          soonBody: 'Recarga de celular e serviços estará disponível em breve.',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>'
        },
        {
          id: 'stmt',
          label: 'Extrato',
          desc: 'Movimentações da conta.',
          mode: 'index',
          target: 'extrato',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>'
        },
        {
          id: 'fees',
          label: 'Taxas',
          desc: 'Tarifas e limites.',
          mode: 'soon',
          soonTitle: 'Taxas e limites',
          soonBody: 'Consulta detalhada de tarifas e pacotes será disponibilizada em breve.',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M8 5h9a3 3 0 010 6H8a3 3 0 000 6h9"/></svg>'
        },
        {
          id: 'openfin',
          label: 'Open Finance',
          desc: 'Conectar contas.',
          mode: 'soon',
          soonTitle: 'Open Finance',
          soonBody: 'Compartilhamento de dados com outras instituições será habilitado em fase futura.',
          svg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>'
        }
      ];

      var grid = document.getElementById('abGrid');
      items.forEach(function (it) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ab-tile' + (it.mode === 'soon' ? ' ab-tile--soon' : '');
        btn.setAttribute('aria-label', it.label + '. ' + it.desc);

        var circle = document.createElement('span');
        circle.className = 'ab-circle';
        circle.innerHTML = it.svg;
        btn.appendChild(circle);

        var lab = document.createElement('span');
        lab.className = 'ab-label';
        lab.textContent = it.label;
        btn.appendChild(lab);

        var d = document.createElement('span');
        d.className = 'ab-desc';
        d.textContent = it.desc;
        btn.appendChild(d);

        btn.addEventListener('click', function () {
          if (it.mode === 'index') {
            goIndexWithTarget(it.target);
          } else if (it.mode === 'href') {
            window.location.href = it.href;
          } else if (it.mode === 'soon') {
            showSoonModal(it.soonTitle, it.soonBody);
          }
        });

        grid.appendChild(btn);
      });

      document.getElementById('abModalSoon').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('ab-modal--open');
      });
    })();
  </script>
</body>
</html>
