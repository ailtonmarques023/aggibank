<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmado - AgilBank</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirmation-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }

        .success-icon i {
            color: white;
            font-size: 40px;
        }

        .confirmation-title {
            color: #2e7d32;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .confirmation-message {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .email-highlight {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
            margin: 10px 0;
        }

        .login-button {
            background: linear-gradient(135deg, #0066b3 0%, #004d8c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 102, 179, 0.3);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 179, 0.4);
        }

        .countdown {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .confirmation-container {
                padding: 30px 20px;
            }
            
            .confirmation-title {
                font-size: 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="confirmation-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h1 class="confirmation-title">Email Confirmado!</h1>
        
        <p class="confirmation-message">
            Sua conta foi ativada com sucesso!<br>
            Agora você pode acessar todos os serviços do AgilBank.
        </p>
        
        <div class="email-highlight" id="userEmail">
            Email confirmado com sucesso
        </div>
        
        <button class="login-button" onclick="redirectToLogin()">
            <div class="loading-spinner" id="loadingSpinner"></div>
            <span id="buttonText">Fazer Login Agora</span>
        </button>
        
        <div class="countdown" id="countdown">
            Redirecionando automaticamente em <span id="timer">5</span> segundos...
        </div>
        
        <div class="footer">
            <p>AgilBank - Sistema de Pagamentos Digitais</p>
        </div>
    </div>

    <script>
        // Obter parâmetros da URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const token = urlParams.get('token');
        
        // Exibir email se disponível
        if (email) {
            document.getElementById('userEmail').textContent = email;
        }
        
        // Contador regressivo
        let countdown = 5;
        const timerElement = document.getElementById('timer');
        const countdownElement = document.getElementById('countdown');
        
        const countdownInterval = setInterval(() => {
            countdown--;
            timerElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                redirectToLogin();
            }
        }, 1000);
        
        function redirectToLogin() {
            const button = document.querySelector('.login-button');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            
            // Mostrar loading
            button.disabled = true;
            loadingSpinner.style.display = 'inline-block';
            buttonText.textContent = 'Redirecionando...';
            countdownElement.style.display = 'none';
            
            // Redirecionar após 1 segundo
            setTimeout(() => {
                window.location.href = 'index.agilbank.html';
            }, 1000);
        }
        
        // Confirmar email no backend (opcional)
        if (token && email) {
            fetch('https://aggibank-production.up.railway.app/api/auth/confirm-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token: token,
                    email: email
                })
            }).catch(error => {
                console.log('Confirmação automática não disponível:', error);
            });
        }
    </script>
</body>
</html>
