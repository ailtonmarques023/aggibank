<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste AgilBank</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0066b3 0%, #004d8c 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #0066b3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        h1 {
            color: #0066b3;
            margin-bottom: 10px;
        }
        .status {
            background: #00a86b;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: #0066b3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .links a:hover {
            background: #004d8c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">A</div>
        <h1>AgilBank Frontend</h1>
        <p>Frontend do banco digital AgilBank</p>
        <div class="status">✅ Servidor funcionando!</div>
        
        <div class="links">
            <a href="/" target="_blank">Abrir Frontend</a>
            <a href="/api/docs" target="_blank">API Docs</a>
        </div>
        
        <div style="margin-top: 30px; font-size: 14px; color: #666;">
            <p><strong>Credenciais de teste:</strong></p>
            <p>Email: admin@agilbank.com</p>
            <p>Senha: 123456</p>
        </div>
    </div>
</body>
</html>
